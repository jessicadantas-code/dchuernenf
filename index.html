function uid() {
  return Math.random().toString(36).slice(2, 10);
}
function roundInt(value) {
  return Math.round(Number(value || 0));
}
function weeklyHours(totalHours, weeks = 15) {
  return Number(totalHours || 0) / Number(weeks || 15);
}
function blocksFromHours(totalHours, weeks = 15) {
  return roundInt(weeklyHours(totalHours, weeks));
}
function isUCE(oferta) {
  return (oferta.codigo || "").startsWith("UCE") || (oferta.nome || "").toUpperCase().includes("UCE");
}
function isEspecialIndividual(oferta) {
  return oferta.tipo === "especial" && oferta.especial === "individual";
}
function docenteNome(id) {

}
function saveState() {

}
function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  const parsed = JSON.parse(raw);
  Object.assign(state, parsed);
  syncAtividades();
  return true;
}
function downloadJson(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}
function csvEscape(value) {
  const raw = String(value ?? "");
  const escaped = raw.replace(/"/g, '""');
  return /[",;\n]/.test(escaped) ? `"${escaped}"` : escaped;
}
function downloadCsv(filename, rows) {
  const csv = "\uFEFF" + rows.map((row) => row.map(csvEscape).join(";")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

function fromCatalogo(comp) {
  return {
    id: uid(),
    periodo: comp.periodo,
    codigo: comp.codigo,
    nome: comp.nome,
    teorica: comp.teorica,
    pratica: comp.pratica,
    total: comp.total,
    tipo: comp.tipo || "obrigatoria",
    especial: comp.especial || "nao",
    docentes: [],
  };
}
function addOfertaFromCatalogo(codigo) {
  const comp = state.catalogo.find((item) => item.codigo === codigo);
  if (!comp) return;
  state.oferta.push(fromCatalogo(comp));
}
function addPeriodoFromCatalogo(periodo) {
  state.catalogo.filter((item) => item.periodo === periodo).forEach((comp) => {
    state.oferta.push(fromCatalogo(comp));
  });
}
function syncAtividades() {
  const ids = new Set(state.docentes.map((d) => d.id));
  Object.keys(state.atividades).forEach((id) => {
    if (!ids.has(id)) delete state.atividades[id];
  });
  state.docentes.forEach((docente) => {
    if (!state.atividades[docente.id]) {
      state.atividades[docente.id] = {
        pesquisaInstitucionalizadaQtd: 0,
        coordProjetoPibicQtd: 0,
        monitoriaQtd: 0,

}

function calcDisciplinaParaDocente(oferta, docenteId) {
  if (!(oferta.docentes || []).includes(docenteId)) return { sala: 0, regencia: 0 };
  if (isUCE(oferta)) return { sala: 1, regencia: 0 };

  const qtdDocentes = (oferta.docentes || []).length || 1;
  const multiplicador = isEspecialIndividual(oferta) ? 0.5 : 1;
  const teoriaSemanal = (weeklyHours(oferta.teorica, 15) / qtdDocentes) * multiplicador;
  const praticaSemanal = weeklyHours(oferta.pratica, 15) * multiplicador;

  return {
    sala: roundInt(teoriaSemanal + praticaSemanal),
    regencia: roundInt(teoriaSemanal + (praticaSemanal * 0.5)),
  };
}
function calcBlocosNecessarios(oferta) {
  if (isUCE(oferta)) return 1;
  return blocksFromHours(oferta.total || (Number(oferta.teorica || 0) + Number(oferta.pratica || 0)), 15);
}
function calcAtividadesDocente(docenteId) {
  const acts = state.atividades[docenteId] || {};
  const nde = { none: 0, membro: 2, coordenacao: 8 }[acts.nde || "none"] || 0;
  const outrasComissoes = (acts.outrasComissoes || []).reduce((acc, item) => acc + Number(item.ch || 0), 0);

  return {
    pesquisaInstitucionalizada: Number(acts.pesquisaInstitucionalizadaQtd || 0) * 4,
    coordProjetoPibic: Number(acts.coordProjetoPibicQtd || 0) * 8,
    monitoria: Number(acts.monitoriaQtd || 0) * 4,
    extensaoCoordQtd: Number(acts.extensaoCoordenacaoQtd || 0),
    extensaoMembroQtd: Number(acts.extensaoMembroQtd || 0),
    extensao: Number(acts.extensaoCoordenacaoQtd || 0) * 8 + Number(acts.extensaoMembroQtd || 0) * 4,
    grupoPesquisaMembro: acts.grupoPesquisaMembro ? 1 : 0,
    grupoPesquisaLider: acts.grupoPesquisaLider ? 2 : 0,
    grupoPesquisa: (acts.grupoPesquisaMembro ? 1 : 0) + (acts.grupoPesquisaLider ? 2 : 0),
    orientTccQtd: Number(acts.orientacoesTcc || 0),
    orientTcc: Number(acts.orientacoesTcc || 0) * 2,
    orientMestradoQtd: Number(acts.orientacoesMestrado || 0),
    orientMestrado: Number(acts.orientacoesMestrado || 0) * 3,
    nde,
    fiel: acts.fiel ? 2 : 0,
    fieb: acts.fieb ? 2 : 0,
    comiteEtica: acts.comiteEtica ? 8 : 0,
    outrasComissoes,
    comissoes: nde + (acts.fiel ? 2 : 0) + (acts.fieb ? 2 : 0) + (acts.comiteEtica ? 8 : 0) + outrasComissoes,
    flags: acts,
  };
}
function calcResumoDocente(docente) {
  let sala = 0;
  let regencia = 0;

  state.oferta.forEach((oferta) => {
    const calc = calcDisciplinaParaDocente(oferta, docente.id);
    sala += calc.sala;
    regencia += calc.regencia;
  });

  const acts = calcAtividadesDocente(docente.id);

  return {
    sala: roundInt(sala),
    regencia: roundInt(regencia),
    monitoria: roundInt(acts.monitoria),
    pesquisaInstitucionalizada: roundInt(acts.pesquisaInstitucionalizada),
    grupoPesquisa: roundInt(acts.grupoPesquisa),
    coordProjetoPibic: roundInt(acts.coordProjetoPibic),
    extensao: roundInt(acts.extensao),
    orientTcc: roundInt(acts.orientTcc),
    orientMestrado: roundInt(acts.orientMestrado),
    comissoes: roundInt(acts.comissoes),
    total: roundInt(
      sala +
      regencia +
      acts.monitoria +
      acts.pesquisaInstitucionalizada +
      acts.grupoPesquisa +
      acts.coordProjetoPibic +
      acts.extensao +
      acts.orientTcc +
      acts.orientMestrado +
      acts.comissoes +
      Number(docente.chFuncao || 0)
    ),
    detalhado: acts,
  };
}
function detalhamentoDisciplinas(docenteId) {
  return state.oferta
    .filter((oferta) => (oferta.docentes || []).includes(docenteId))
    .map((oferta) => {
      const calc = calcDisciplinaParaDocente(oferta, docenteId);
      return {
        periodo: oferta.periodo,
        codigo: oferta.codigo,
        disciplina: oferta.nome,
        sala: calc.sala,
        regencia: calc.regencia,
      };
    });
}
function expandHorarioItem(item) {
  const oferta = state.oferta.find((o) => o.id === item.ofertaId);
  if (!oferta) return [];
  const arr = [];
  for (let i = 0; i < Number(item.qtdBlocos || 0); i++) {
    arr.push({
      horarioId: item.id,
      ofertaId: item.ofertaId,
      periodo: oferta.periodo,
      docentes: oferta.docentes || [],
      dia: item.dia,
      turno: item.turno,
      bloco: Number(item.blocoInicial || 1) + i,
    });
  }
  return arr;
}
function detectConflicts() {
  const expanded = state.horarios.flatMap(expandHorarioItem);
  const result = {};
  state.horarios.forEach((h) => {
    result[h.id] = { docente: false, periodo: false };
  });

  for (let i = 0; i < expanded.length; i++) {
    for (let j = i + 1; j < expanded.length; j++) {
      const a = expanded[i];
      const b = expanded[j];
      if (a.horarioId === b.horarioId) continue;
      if (a.dia !== b.dia || a.turno !== b.turno || a.bloco !== b.bloco) continue;

      if (a.periodo && b.periodo && a.periodo === b.periodo) {
        result[a.horarioId].periodo = true;
        result[b.horarioId].periodo = true;
      }
      if ((a.docentes || []).some((id) => (b.docentes || []).includes(id))) {
        result[a.horarioId].docente = true;
        result[b.horarioId].docente = true;
      }
    }
  }
  return result;
}

function buildResumoDetalhadoTexto(docenteId) {
  const a = calcAtividadesDocente(docenteId);
  const linhas = [];

  linhas.push(`Extensão coordenação: ${a.extensaoCoordQtd} ação(ões) = ${a.extensaoCoordQtd * 8}h`);
  linhas.push(`Extensão membro: ${a.extensaoMembroQtd} ação(ões) = ${a.extensaoMembroQtd * 4}h`);
  linhas.push(`Grupo de pesquisa membro: ${a.flags.grupoPesquisaMembro ? "Sim (1h)" : "Não"}`);
  linhas.push(`Grupo de pesquisa líder: ${a.flags.grupoPesquisaLider ? "Sim (2h)" : "Não"}`);
  linhas.push(`NDE: ${
    a.flags.nde === "coordenacao" ? "Coordenação (8h)" :
    a.flags.nde === "membro" ? "Membro (2h)" : "Não"
  }`);
  linhas.push(`FIEL: ${a.flags.fiel ? "Sim (2h)" : "Não"}`);
  linhas.push(`FIEB: ${a.flags.fieb ? "Sim (2h)" : "Não"}`);
  linhas.push(`Comitê de Ética: ${a.flags.comiteEtica ? "Sim (8h)" : "Não"}`);
  (a.flags.outrasComissoes || []).forEach((item) => linhas.push(`Comissão: ${item.nome || "(sem nome)"} = ${item.ch || 0}h`));
  return linhas;
}

            const slots = (blocosPorTurno[linha.turno] || [])
              .slice(Number(linha.blocoInicial) - 1, Number(linha.blocoInicial) - 1 + Number(linha.qtdBlocos))
              .map((b) => b.faixa)
              .join("<br>");

    const maxBlocosTurno = (blocosPorTurno[turno] || []).length;

      alert("A quantidade de blocos ultrapassa o limite do turno.");

    btn.onclick = () => {
      state.horarios = state.horarios.filter((h) => h.id !== btn.dataset.delHorario);

                          <div class="slot-card">
                            <div class="slot-title">${oferta?.nome || ""}</div>
                            <div class="slot-sub">${oferta?.periodo || ""}</div>
                            <div class="slot-sub">${docentes}</div>
                          </div>
                        `;
                      }).join("")}
                    </td>
                  `;
                }).join("")}
              </tr>
            `).join("")
          ).join("")}
        </tbody>
      </table>
    </div>
  `;

  panel.querySelector("#grade-view").onchange = (e) => {
    state.gradeFilters.view = e.target.value;
    render();
  };
  panel.querySelector("#grade-turma").onchange = (e) => {
    state.gradeFilters.turma = e.target.value;
    render();
  };
  panel.querySelector("#grade-docente").onchange = (e) => {
    state.gradeFilters.docente = e.target.value;
    render();
  };
}

function gerarPdfTabela(title, head, body, filename) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "landscape" });
  doc.setFontSize(13);
  doc.text("UNIVERSIDADE DO ESTADO DO RIO GRANDE DO NORTE", 14, 14);
  doc.setFontSize(11);
  doc.text("Campus Caicó — Curso de Enfermagem", 14, 21);
  doc.setFontSize(12);
  doc.text(title, 14, 30);
  doc.autoTable({
    startY: 36,
    head,
    body,
    styles: { fontSize: 8, cellPadding: 2 },
    headStyles: { fillColor: [36, 87, 197] },
  });
  doc.save(filename);
}
function renderRelatorios() {
  const panel = document.getElementById("panel-relatorios");
  if (!state.relDocenteId && state.docentes[0]?.id) state.relDocenteId = state.docentes[0].id;

  const resumos = state.docentes.map((docente) => ({
    id: docente.id,
    nome: docente.nome,
    ...calcResumoDocente(docente),
  }));
  const selectedDocente = state.relDocenteId;
  const resumoDocente = resumos.find((r) => r.id === selectedDocente);
  const periodos = [...new Set(state.oferta.map((o) => o.periodo).filter(Boolean))];
  const selectedPeriodo = state.relPeriodo || periodos[0] || "P2";
  const horariosPeriodo = state.horarios.filter((horario) => {
    const oferta = state.oferta.find((o) => o.id === horario.ofertaId);
    return oferta && oferta.periodo === selectedPeriodo;
  });

  const detalhamentoDocente = resumoDocente ? detalhamentoDisciplinas(selectedDocente) : [];
  const atividadesDetalhadas = resumoDocente ? buildResumoDetalhadoTexto(selectedDocente) : [];

  panel.innerHTML = `
    <div class="bar"><h2>Relatórios</h2></div>

    <div class="card" style="margin-bottom:.8rem">
      <div class="bar">
        <h3>Quadro resumo por docente</h3>
        <div class="inline-actions">
          <select id="rel-docente">
            ${state.docentes.map((doc) => `<option value="${doc.id}" ${doc.id === selectedDocente ? "selected" : ""}>${doc.nome || "(sem nome)"}</option>`).join("")}
          </select>
          <button id="csv-docente">CSV</button>
          <button id="pdf-docente">PDF</button>
        </div>
      </div>

      ${resumoDocente ? `
        <table>
          <thead>
            <tr>
              <th>Docente</th><th>Sala</th><th>Regência</th><th>Monitoria</th><th>Pesquisa</th><th>Coord. PIBIC</th><th>Extensão</th><th>Orient. TCC</th><th>Orient. Mestrado</th><th>Comissões</th><th>Total</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>${resumoDocente.nome}</td>
              <td>${resumoDocente.sala}</td>
              <td>${resumoDocente.regencia}</td>
              <td>${resumoDocente.monitoria}</td>
              <td>${resumoDocente.pesquisaInstitucionalizada + resumoDocente.grupoPesquisa}</td>
              <td>${resumoDocente.coordProjetoPibic}</td>
              <td>${resumoDocente.extensao}</td>
              <td>${resumoDocente.orientTcc}</td>
              <td>${resumoDocente.orientMestrado}</td>
              <td>${resumoDocente.comissoes}</td>
              <td>${resumoDocente.total}</td>
            </tr>
          </tbody>
        </table>

        <div class="card" style="margin-top:.8rem">
          <div class="bar"><h4>Disciplinas do docente</h4></div>
          <table>
            <thead><tr><th>Período</th><th>Código</th><th>Disciplina</th><th>CH sala</th><th>CH regência</th></tr></thead>
            <tbody>
              ${detalhamentoDocente.map((item) => `<tr><td>${item.periodo}</td><td>${item.codigo}</td><td>${item.disciplina}</td><td>${item.sala}</td><td>${item.regencia}</td></tr>`).join("")}
            </tbody>
          </table>
        </div>

        <div class="card" style="margin-top:.8rem">
          <div class="bar"><h4>Detalhamento das atividades</h4></div>
          <ul class="detail-list">
            ${atividadesDetalhadas.map((linha) => `<li>${linha}</li>`).join("")}
          </ul>
        </div>
      ` : ""}
    </div>

    <div class="card" style="margin-bottom:.8rem">
      <div class="bar">
        <h3>Quadro resumo de todos os docentes</h3>
        <div class="inline-actions">
          <button id="csv-todos">CSV</button>
          <button id="pdf-todos">PDF</button>
        </div>
      </div>

      <table>
        <thead>
          <tr><th>Docente</th><th>Sala</th><th>Regência</th><th>Monitoria</th><th>Pesquisa</th><th>Coord. PIBIC</th><th>Extensão</th><th>Orientações</th><th>Comissões</th><th>Total</th></tr>
        </thead>
        <tbody>
          ${resumos.map((r) => `
            <tr>
              <td>${r.nome}</td>
              <td>${r.sala}</td>
              <td>${r.regencia}</td>
              <td>${r.monitoria}</td>
              <td>${r.pesquisaInstitucionalizada + r.grupoPesquisa}</td>
              <td>${r.coordProjetoPibic}</td>
              <td>${r.extensao}</td>
              <td>${r.orientTcc + r.orientMestrado}</td>
              <td>${r.comissoes}</td>
              <td>${r.total}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="bar">
        <h3>Quadro de horários por período</h3>
        <div class="inline-actions">
          <select id="rel-periodo">
            ${periodos.map((p) => `<option value="${p}" ${selectedPeriodo === p ? "selected" : ""}>${p}</option>`).join("")}
          </select>
          <button id="csv-horarios">CSV</button>
          <button id="pdf-horarios">PDF</button>
        </div>
      </div>

      <table>
        <thead><tr><th>Disciplina</th><th>Dia</th><th>Turno</th><th>Bloco inicial</th><th>Qtd.</th><th>Docentes</th></tr></thead>
        <tbody>
          ${horariosPeriodo.map((h) => {
            const oferta = state.oferta.find((o) => o.id === h.ofertaId);
            const docentes = (oferta?.docentes || []).map(docenteNome).filter(Boolean).join(", ");
            return `<tr><td>${oferta?.nome || ""}</td><td>${h.dia}</td><td>${h.turno}</td><td>${h.blocoInicial}</td><td>${h.qtdBlocos}</td><td>${docentes}</td></tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;

  panel.querySelector("#rel-docente").onchange = (e) => {
    state.relDocenteId = e.target.value;
    render();
  };
  panel.querySelector("#rel-periodo").onchange = (e) => {
    state.relPeriodo = e.target.value;
    render();
  };

  panel.querySelector("#csv-docente").onclick = () => {
    if (!resumoDocente) return;
    downloadCsv("relatorio_docente.csv", [
      ["Docente", "Sala", "Regência", "Monitoria", "Pesquisa", "Coord. PIBIC", "Extensão", "Orient. TCC", "Orient. Mestrado", "Comissões", "Total"],
      [resumoDocente.nome, resumoDocente.sala, resumoDocente.regencia, resumoDocente.monitoria, resumoDocente.pesquisaInstitucionalizada + resumoDocente.grupoPesquisa, resumoDocente.coordProjetoPibic, resumoDocente.extensao, resumoDocente.orientTcc, resumoDocente.orientMestrado, resumoDocente.comissoes, resumoDocente.total],
      [],
      ["Período", "Código", "Disciplina", "CH sala", "CH regência"],
      ...detalhamentoDocente.map((item) => [item.periodo, item.codigo, item.disciplina, item.sala, item.regencia]),
      [],
      ["Detalhamento das atividades"],
      ...atividadesDetalhadas.map((txt) => [txt]),
    ]);
  };
  panel.querySelector("#pdf-docente").onclick = () => {
    if (!resumoDocente) return;
    gerarPdfTabela(
      "Quadro resumo por docente",
      [["Docente", "Sala", "Regência", "Monitoria", "Pesquisa", "Coord. PIBIC", "Extensão", "Orient. TCC", "Orient. Mestrado", "Comissões", "Total"]],
      [[resumoDocente.nome, resumoDocente.sala, resumoDocente.regencia, resumoDocente.monitoria, resumoDocente.pesquisaInstitucionalizada + resumoDocente.grupoPesquisa, resumoDocente.coordProjetoPibic, resumoDocente.extensao, resumoDocente.orientTcc, resumoDocente.orientMestrado, resumoDocente.comissoes, resumoDocente.total]],
      "relatorio_docente.pdf"
    );
  };
  panel.querySelector("#csv-todos").onclick = () => {
    downloadCsv("relatorio_todos_docentes.csv", [
      ["Docente", "Sala", "Regência", "Monitoria", "Pesquisa", "Coord. PIBIC", "Extensão", "Orientações", "Comissões", "Total"],
      ...resumos.map((r) => [r.nome, r.sala, r.regencia, r.monitoria, r.pesquisaInstitucionalizada + r.grupoPesquisa, r.coordProjetoPibic, r.extensao, r.orientTcc + r.orientMestrado, r.comissoes, r.total]),
    ]);
  };
  panel.querySelector("#pdf-todos").onclick = () => {
    gerarPdfTabela(
      "Quadro resumo de todos os docentes",
      [["Docente", "Sala", "Regência", "Monitoria", "Pesquisa", "Coord. PIBIC", "Extensão", "Orientações", "Comissões", "Total"]],
      resumos.map((r) => [r.nome, r.sala, r.regencia, r.monitoria, r.pesquisaInstitucionalizada + r.grupoPesquisa, r.coordProjetoPibic, r.extensao, r.orientTcc + r.orientMestrado, r.comissoes, r.total]),
      "relatorio_todos_docentes.pdf"
    );
  };
  panel.querySelector("#csv-horarios").onclick = () => {
    downloadCsv(`relatorio_horarios_${selectedPeriodo}.csv`, [
      ["Disciplina", "Dia", "Turno", "Bloco inicial", "Qtd.", "Docentes"],
      ...horariosPeriodo.map((h) => {
        const oferta = state.oferta.find((o) => o.id === h.ofertaId);
        const docentes = (oferta?.docentes || []).map(docenteNome).filter(Boolean).join(", ");
        return [oferta?.nome || "", h.dia, h.turno, h.blocoInicial, h.qtdBlocos, docentes];
      }),
    ]);
  };
  panel.querySelector("#pdf-horarios").onclick = () => {
    gerarPdfTabela(
      `Quadro de horários - ${selectedPeriodo}`,
      [["Disciplina", "Dia", "Turno", "Bloco inicial", "Qtd.", "Docentes"]],
      horariosPeriodo.map((h) => {
        const oferta = state.oferta.find((o) => o.id === h.ofertaId);
        const docentes = (oferta?.docentes || []).map(docenteNome).filter(Boolean).join(", ");
        return [oferta?.nome || "", h.dia, h.turno, h.blocoInicial, h.qtdBlocos, docentes];
      }),
      `relatorio_horarios_${selectedPeriodo}.pdf`
    );
  };
}

function render() {
  syncAtividades();
  renderTabs();
  showPanel(state.activeTab);
  renderDocentes();
  renderOferta();
  renderAtividades();
  renderResumo();
  renderHorarios();
  renderGrade();
  renderRelatorios();
  saveState();
}

document.getElementById("btnSeed").onclick = () => {
  seedData();
  render();
};
document.getElementById("btnExportJson").onclick = () => {
  downloadJson("dch_uern_dados.json", state);
};
document.getElementById("inputImport").onchange = (event) => {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const imported = JSON.parse(reader.result);
    Object.assign(state, imported);
    syncAtividades();
    render();
  };
  reader.readAsText(file);
};
document.getElementById("btnReset").onclick = () => {
  if (!confirm("Limpar tudo?")) return;
  localStorage.removeItem(STORAGE_KEY);
  seedData();
  render();
};

if (!loadState()) {
  seedData();
}
render();
</script>
