const tabs = [

const dias = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"];
const blocosPorTurno = {
  "Manhã": [
    { numero: 1, faixa: "07:00–07:50" },
    { numero: 2, faixa: "07:50–08:40" },

    { numero: 1, faixa: "13:00–13:50" },
    { numero: 2, faixa: "13:50–14:40" },
    { numero: 3, faixa: "14:40–15:30" },
    { numero: 4, faixa: "15:30–16:20" },
    { numero: 5, faixa: "16:20–17:10" },
    { numero: 6, faixa: "17:10–18:00" },
  ],
  "Noite": [
    { numero: 1, faixa: "18:30–19:20" },
    { numero: 2, faixa: "19:20–20:10" },
    { numero: 3, faixa: "20:10–21:00" },
    { numero: 4, faixa: "21:00–21:50" },

};

const state = {
  docentes: [],
  oferta: [],
  atividades: {},
  horarios: [],
  activeTab: "docentes",
  gradeFilters: {
    view: "turma",
    turma: "",
    docente: "",
  },
  resumoDocenteId: "",
};

function uid() {
  return Math.random().toString(36).slice(2, 10);
}
function roundInt(value) {
  return Math.round(Number(value || 0));
}
function weeklyHours(totalHours, weeks = 15) {
  return Number(totalHours || 0) / Number(weeks || 15);
}
function blocksFromHours(totalHours, weeks = 15) {
  return roundInt(weeklyHours(totalHours, weeks));
}
function isUCE(oferta) {
  return (oferta.codigo || "").startsWith("UCE") || (oferta.nome || "").toUpperCase().includes("UCE");
}
function docenteNome(id) {
  return state.docentes.find((d) => d.id === id)?.nome || "";
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  const parsed = JSON.parse(raw);
  Object.assign(state, parsed);
  syncAtividades();
  return true;
}
function downloadJson(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}
function syncAtividades() {
  const ids = new Set(state.docentes.map((d) => d.id));
  Object.keys(state.atividades).forEach((id) => {
    if (!ids.has(id)) delete state.atividades[id];
  });
  state.docentes.forEach((docente) => {
    if (!state.atividades[docente.id]) {
      state.atividades[docente.id] = {
        pesquisaInstitucionalizadaQtd: 0,
        coordProjetoPibicQtd: 0,
        monitoriaQtd: 0,
        extensaoCoordenacaoQtd: 0,
        extensaoMembroQtd: 0,
        grupoPesquisaMembro: false,
        grupoPesquisaLider: false,
        nde: "none",
        fiel: false,
        fieb: false,
        comiteEtica: false,
        orientacoesTcc: 0,
        orientacoesMestrado: 0,
        outrasComissoes: [],
      };
    }
  });
}

function calcDisciplinaParaDocente(oferta, docenteId) {
  if (!(oferta.docentes || []).includes(docenteId)) return { sala: 0, regencia: 0 };
  if (isUCE(oferta)) return { sala: 1, regencia: 0 };
  const qtdDocentes = (oferta.docentes || []).length || 1;
  const teoriaSemanal = weeklyHours(oferta.teorica, 15) / qtdDocentes;
  const praticaSemanal = weeklyHours(oferta.pratica, 15);
  return {
    sala: roundInt(teoriaSemanal + praticaSemanal),
    regencia: roundInt(teoriaSemanal + (praticaSemanal * 0.5)),
  };
}
function calcBlocosNecessarios(oferta) {
  if (isUCE(oferta)) return 1;
  return blocksFromHours(oferta.total || (Number(oferta.teorica || 0) + Number(oferta.pratica || 0)), 15);
}
function calcAtividadesDocente(docenteId) {
  const acts = state.atividades[docenteId] || {};
  const nde = { none: 0, membro: 2, coordenacao: 8 }[acts.nde || "none"] || 0;
  const outrasComissoes = (acts.outrasComissoes || []).reduce((acc, item) => acc + Number(item.ch || 0), 0);
  return {
    pesquisaInstitucionalizada: Number(acts.pesquisaInstitucionalizadaQtd || 0) * 4,
    coordProjetoPibic: Number(acts.coordProjetoPibicQtd || 0) * 8,
    monitoria: Number(acts.monitoriaQtd || 0) * 4,
    extensao: Number(acts.extensaoCoordenacaoQtd || 0) * 8 + Number(acts.extensaoMembroQtd || 0) * 4,
    grupoPesquisa: (acts.grupoPesquisaMembro ? 1 : 0) + (acts.grupoPesquisaLider ? 2 : 0),
    orientTcc: Number(acts.orientacoesTcc || 0) * 2,
    orientMestrado: Number(acts.orientacoesMestrado || 0) * 3,
    comissoes: nde + (acts.fiel ? 2 : 0) + (acts.fieb ? 2 : 0) + (acts.comiteEtica ? 8 : 0) + outrasComissoes,
  };
}
function calcResumoDocente(docente) {
  let sala = 0;
  let regencia = 0;

  state.oferta.forEach((oferta) => {
    const calc = calcDisciplinaParaDocente(oferta, docente.id);
    sala += calc.sala;
    regencia += calc.regencia;
  });

  const acts = calcAtividadesDocente(docente.id);

  return {
    sala: roundInt(sala),
    regencia: roundInt(regencia),
    monitoria: roundInt(acts.monitoria),
    pesquisaInstitucionalizada: roundInt(acts.pesquisaInstitucionalizada),
    grupoPesquisa: roundInt(acts.grupoPesquisa),
    coordProjetoPibic: roundInt(acts.coordProjetoPibic),
    extensao: roundInt(acts.extensao),
    orientTcc: roundInt(acts.orientTcc),
    orientMestrado: roundInt(acts.orientMestrado),
    comissoes: roundInt(acts.comissoes),
    total: roundInt(
      sala +
      regencia +
      acts.monitoria +
      acts.pesquisaInstitucionalizada +
      acts.grupoPesquisa +
      acts.coordProjetoPibic +
      acts.extensao +
      acts.orientTcc +
      acts.orientMestrado +
      acts.comissoes +
      Number(docente.chFuncao || 0)
    ),
  };
}
function detalhamentoDisciplinas(docenteId) {
  return state.oferta
    .filter((oferta) => (oferta.docentes || []).includes(docenteId))
    .map((oferta) => {
      const calc = calcDisciplinaParaDocente(oferta, docenteId);
      return {
        periodo: oferta.periodo,
        codigo: oferta.codigo,
        disciplina: oferta.nome,
        sala: calc.sala,
        regencia: calc.regencia,
      };
    });
}
function expandHorarioItem(item) {
  const oferta = state.oferta.find((o) => o.id === item.ofertaId);
  if (!oferta) return [];
  const arr = [];
  for (let i = 0; i < Number(item.qtdBlocos || 0); i++) {
    arr.push({
      horarioId: item.id,
      ofertaId: item.ofertaId,
      periodo: oferta.periodo,
      docentes: oferta.docentes || [],
      dia: item.dia,
      turno: item.turno,
      bloco: Number(item.blocoInicial || 1) + i,
    });
  }
  return arr;
}
function detectConflicts() {
  const expanded = state.horarios.flatMap(expandHorarioItem);
  const result = {};
  state.horarios.forEach((h) => {
    result[h.id] = { docente: false, periodo: false };
  });

  for (let i = 0; i < expanded.length; i++) {
    for (let j = i + 1; j < expanded.length; j++) {
      const a = expanded[i];
      const b = expanded[j];
      if (a.horarioId === b.horarioId) continue;
      if (a.dia !== b.dia || a.turno !== b.turno || a.bloco !== b.bloco) continue;

      if (a.periodo && b.periodo && a.periodo === b.periodo) {
        result[a.horarioId].periodo = true;
        result[b.horarioId].periodo = true;
      }

      if ((a.docentes || []).some((id) => (b.docentes || []).includes(id))) {
        result[a.horarioId].docente = true;
        result[b.horarioId].docente = true;
      }
    }
  }
  return result;
}
function activateTab(key) {
  state.activeTab = key;
  render();
}
function renderTabs() {
  const nav = document.getElementById("tabs");
  nav.innerHTML = tabs.map((tab) => `
    <button class="tab ${state.activeTab === tab.key ? "active" : ""}" data-tab="${tab.key}">
      ${tab.label}

  `).join("");

  nav.querySelectorAll(".tab").forEach((btn) => {
    btn.onclick = () => activateTab(btn.dataset.tab);
  });
}

                  <option value="none" ${acts.nde === "none" ? "selected" : ""}>Não</option>
                  <option value="membro" ${acts.nde === "membro" ? "selected" : ""}>Membro</option>
                  <option value="coordenacao" ${acts.nde === "coordenacao" ? "selected" : ""}>Coordenação</option>
                </select>
              </div>

              <label><input type="checkbox" data-atividade="${docente.id}" data-f="grupoPesquisaMembro" ${acts.grupoPesquisaMembro ? "checked" : ""} /> Grupo de pesquisa membro</label>
              <label><input type="checkbox" data-atividade="${docente.id}" data-f="grupoPesquisaLider" ${acts.grupoPesquisaLider ? "checked" : ""} /> Grupo de pesquisa líder</label>
              <label><input type="checkbox" data-atividade="${docente.id}" data-f="fiel" ${acts.fiel ? "checked" : ""} /> FIEL</label>
              <label><input type="checkbox" data-atividade="${docente.id}" data-f="fieb" ${acts.fieb ? "checked" : ""} /> FIEB</label>
              <label><input type="checkbox" data-atividade="${docente.id}" data-f="comiteEtica" ${acts.comiteEtica ? "checked" : ""} /> Comitê de Ética</label>

              <div>
                <label>Orientações TCC</label>
                <input type="number" min="0" data-atividade="${docente.id}" data-f="orientacoesTcc" value="${acts.orientacoesTcc || 0}" />
              </div>

              <div>
                <label>Orientações Mestrado</label>
                <input type="number" min="0" data-atividade="${docente.id}" data-f="orientacoesMestrado" value="${acts.orientacoesMestrado || 0}" />
              </div>
            </div>

            <div style="margin-top:1rem">
              <div class="bar">
                <h4>Outras comissões</h4>
                <button data-add-comissao="${docente.id}">Adicionar</button>
              </div>

              ${(acts.outrasComissoes || []).map((item, idx) => `
                <div class="comissao-item">
                  <div>
                    <label>Nome</label>
                    <input data-comissao-docente="${docente.id}" data-comissao-idx="${idx}" data-kind="nome" value="${item.nome || ""}" />
                  </div>
                  <div>
                    <label>CH</label>
                    <input type="number" min="0" data-comissao-docente="${docente.id}" data-comissao-idx="${idx}" data-kind="ch" value="${item.ch || 0}" />
                  </div>
                  <div>
                    <button data-del-comissao="${docente.id}" data-comissao-idx="${idx}">Remover</button>
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;

  panel.querySelectorAll("[data-atividade]").forEach((el) => {
    el.onchange = () => {
      const acts = state.atividades[el.dataset.atividade];
      acts[el.dataset.f] = el.type === "checkbox"
        ? el.checked
        : el.tagName === "SELECT"
        ? el.value
        : Number(el.value);
      render();
    };
  });

  panel.querySelectorAll("[data-add-comissao]").forEach((btn) => {
    btn.onclick = () => {
      state.atividades[btn.dataset.addComissao].outrasComissoes.push({ nome: "", ch: 0 });
      render();
    };
  });

  panel.querySelectorAll("[data-comissao-docente]").forEach((el) => {
    el.onchange = () => {
      const docenteId = el.dataset.comissaoDocente;
      const idx = Number(el.dataset.comissaoIdx);
      state.atividades[docenteId].outrasComissoes[idx][el.dataset.kind] =
        el.type === "number" ? Number(el.value) : el.value;
      render();
    };
  });

  panel.querySelectorAll("[data-del-comissao]").forEach((btn) => {
    btn.onclick = () => {
      const docenteId = btn.dataset.delComissao;
      const idx = Number(btn.dataset.comissaoIdx);
      state.atividades[docenteId].outrasComissoes.splice(idx, 1);
      render();
    };
  });
}
function renderResumo() {
  const panel = document.getElementById("panel-resumo");
  if (!state.resumoDocenteId && state.docentes[0]?.id) {
    state.resumoDocenteId = state.docentes[0].id;
  }

  const docente = state.docentes.find((d) => d.id === state.resumoDocenteId);
  if (!docente) {
    panel.innerHTML = `<div class="small">Nenhum docente cadastrado.</div>`;
    return;
  }

  const resumo = calcResumoDocente(docente);
  const disciplinas = detalhamentoDisciplinas(docente.id);

  panel.innerHTML = `
    <div class="bar">
      <h2>Resumo individual por docente</h2>
      <div style="min-width:280px">
        <select id="sel-resumo-docente">
          ${state.docentes.map((doc) => `
            <option value="${doc.id}" ${doc.id === state.resumoDocenteId ? "selected" : ""}>
              ${doc.nome || "(sem nome)"}
            </option>
          `).join("")}
        </select>
      </div>
    </div>

    <div class="resumo-cards">
      <div class="resumo-card">
        <h3>Ensino</h3>
        <p>Sala de aula: <strong>${resumo.sala}</strong></p>
        <p>Regência: <strong>${resumo.regencia}</strong></p>
        <p>Monitoria: <strong>${resumo.monitoria}</strong></p>
      </div>

      <div class="resumo-card">
        <h3>Pesquisa</h3>
        <p>Pesquisa institucionalizada: <strong>${resumo.pesquisaInstitucionalizada}</strong></p>
        <p>Grupo de pesquisa: <strong>${resumo.grupoPesquisa}</strong></p>
        <p>Coord. PIBIC: <strong>${resumo.coordProjetoPibic}</strong></p>
      </div>

      <div class="resumo-card">
        <h3>Extensão</h3>
        <p><strong>${resumo.extensao}</strong></p>
      </div>

      <div class="resumo-card">
        <h3>Orientações</h3>
        <p>TCC: <strong>${resumo.orientTcc}</strong></p>
        <p>Mestrado: <strong>${resumo.orientMestrado}</strong></p>
      </div>

      <div class="resumo-card">
        <h3>Comissões</h3>
        <p><strong>${resumo.comissoes}</strong></p>
      </div>

      <div class="resumo-card destaque">
        <h3>Total</h3>
        <p><strong>${resumo.total}</strong></p>
      </div>
    </div>

    <div class="card" style="margin-top:1rem">
      <div class="bar"><h3>Disciplinas do docente</h3></div>
      <table>
        <thead>
          <tr>
            <th>Período</th>
            <th>Código</th>
            <th>Disciplina</th>
            <th>CH sala</th>
            <th>CH regência</th>
          </tr>
        </thead>
        <tbody>
          ${disciplinas.map((item) => `
            <tr>
              <td>${item.periodo}</td>
              <td>${item.codigo}</td>
              <td>${item.disciplina}</td>
              <td>${item.sala}</td>
              <td>${item.regencia}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;

  panel.querySelector("#sel-resumo-docente").onchange = (e) => {
    state.resumoDocenteId = e.target.value;
    render();
  };
}
function renderHorarios() {
  const panel = document.getElementById("panel-horarios");
  const conflicts = detectConflicts();

  panel.innerHTML = `
    <div class="bar"><h2>Horários por blocos de 50 minutos</h2></div>

    <div class="help">
      Agora o cadastro é feito por blocos semanais. Uma disciplina pode ser distribuída em mais de um dia da semana.
      Ex.: Morfo I = 10 blocos → 5 blocos na segunda e 5 na quarta.
      O sistema compara conflito de período e de docente.
    </div>

    ${state.oferta.map((oferta) => {
      const usados = state.horarios
        .filter((h) => h.ofertaId === oferta.id)
        .reduce((acc, item) => acc + Number(item.qtdBlocos || 0), 0);

      const necessarios = calcBlocosNecessarios(oferta);
      const saldo = necessarios - usados;
      const docentes = (oferta.docentes || []).map(docenteNome).filter(Boolean).join(", ");

      const linhas = state.horarios.filter((h) => h.ofertaId === oferta.id);

      return `
        <div class="block-card">
          <div class="bar">
            <div>
              <strong>${oferta.nome}</strong>
              <span class="period-chip">${oferta.periodo || ""}</span>
              <div class="small">${oferta.codigo || ""} • ${docentes || "Sem docentes"}</div>
            </div>
            <div class="small">
              Blocos exigidos: <strong>${necessarios}</strong> • distribuídos: <strong>${usados}</strong> • saldo: <strong>${saldo}</strong>
            </div>
          </div>

          <div class="block-meter">
            <span style="width:${Math.min(100, necessarios ? (usados / necessarios) * 100 : 0)}%"></span>
          </div>

          <div class="horario-grid" style="margin-top:.8rem">
            <div>
              <label>Dia</label>
              <select data-dia-oferta="${oferta.id}">
                ${dias.map((dia) => `<option value="${dia}">${dia}</option>`).join("")}
              </select>
            </div>

            <div>
              <label>Turno</label>
              <select data-turno-oferta="${oferta.id}">
                ${Object.keys(blocosPorTurno).map((turno) => `<option value="${turno}">${turno}</option>`).join("")}
              </select>
            </div>

            <div>
              <label>Bloco inicial</label>
              <select data-bloco-oferta="${oferta.id}">
                ${blocosPorTurno["Manhã"].map((item) => `<option value="${item.numero}">${item.numero}</option>`).join("")}
              </select>
            </div>

            <div>
              <label>Qtd. blocos</label>
              <input type="number" min="1" max="6" value="1" data-qtd-oferta="${oferta.id}" />
            </div>

            <div>
              <button data-add-horario-oferta="${oferta.id}">Adicionar</button>
            </div>
          </div>

          <div class="card" style="margin-top:.8rem">
            <table>
              <thead>
                <tr>
                  <th>Dia</th>
                  <th>Turno</th>
                  <th>Bloco inicial</th>
                  <th>Qtd. blocos</th>
                  <th>Faixas</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${linhas.map((linha) => {
                  const slots = (blocosPorTurno[linha.turno] || [])
                    .slice(Number(linha.blocoInicial) - 1, Number(linha.blocoInicial) - 1 + Number(linha.qtdBlocos))
                    .map((b) => b.faixa)
                    .join("<br>");

                  const c = conflicts[linha.id] || { docente: false, periodo: false };
                  let badge = `<span class="badge ok">OK</span>`;
                  if (c.docente && c.periodo) badge = `<span class="badge bad">Docente + Período</span>`;
                  else if (c.docente) badge = `<span class="badge bad">Docente</span>`;
                  else if (c.periodo) badge = `<span class="badge warn">Período</span>`;

                  return `
                    <tr>
                      <td>${linha.dia}</td>
                      <td>${linha.turno}</td>
                      <td>${linha.blocoInicial}</td>
                      <td>${linha.qtdBlocos}</td>
                      <td>${slots}</td>
                      <td>${badge}</td>
                      <td><button data-del-horario="${linha.id}">Excluir</button></td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }).join("")}
  `;

  panel.querySelectorAll("[data-turno-oferta]").forEach((sel) => {
    sel.onchange = () => {
      const ofertaId = sel.dataset.turnoOferta;
      const blocoSelect = panel.querySelector(`[data-bloco-oferta="${ofertaId}"]`);
      blocoSelect.innerHTML = (blocosPorTurno[sel.value] || []).map((item) => `
        <option value="${item.numero}">${item.numero}</option>
      `).join("");
    };
  });

  panel.querySelectorAll("[data-add-horario-oferta]").forEach((btn) => {
    btn.onclick = () => {
      const ofertaId = btn.dataset.addHorarioOferta;
      const dia = panel.querySelector(`[data-dia-oferta="${ofertaId}"]`).value;
      const turno = panel.querySelector(`[data-turno-oferta="${ofertaId}"]`).value;
      const blocoInicial = Number(panel.querySelector(`[data-bloco-oferta="${ofertaId}"]`).value);
      const qtdBlocos = Number(panel.querySelector(`[data-qtd-oferta="${ofertaId}"]`).value);

      const maxBlocosTurno = (blocosPorTurno[turno] || []).length;
      if (blocoInicial + qtdBlocos - 1 > maxBlocosTurno) {
        alert("A quantidade de blocos ultrapassa o limite do turno.");
        return;
      }

      state.horarios.push({
        id: uid(),
        ofertaId,
        dia,
        turno,
        blocoInicial,
        qtdBlocos,
      });

      render();
    };
  });

  panel.querySelectorAll("[data-del-horario]").forEach((btn) => {
    btn.onclick = () => {
      state.horarios = state.horarios.filter((h) => h.id !== btn.dataset.delHorario);
      render();
    };
  });
}
function renderGrade() {
  const panel = document.getElementById("panel-grade");

  const filtered = state.horarios.filter((horario) => {
    const oferta = state.oferta.find((o) => o.id === horario.ofertaId);
    if (!oferta) return false;

    if (state.gradeFilters.view === "turma") {
      return !state.gradeFilters.turma || oferta.periodo === state.gradeFilters.turma;
    }
    return !state.gradeFilters.docente || (oferta.docentes || []).includes(state.gradeFilters.docente);
  });

  panel.innerHTML = `
    <div class="bar">
      <h2>Grade semanal</h2>
      <div class="filters">
        <div>
          <label>Visualizar por</label>
          <select id="grade-view">
            <option value="turma" ${state.gradeFilters.view === "turma" ? "selected" : ""}>Turma</option>
            <option value="docente" ${state.gradeFilters.view === "docente" ? "selected" : ""}>Docente</option>
          </select>
        </div>

        <div id="grade-wrap-turma" style="display:${state.gradeFilters.view === "turma" ? "block" : "none"}">
          <label>Turma</label>
          <select id="grade-turma">
            <option value="">Todas</option>
            ${[...new Set(state.oferta.map((o) => o.periodo).filter(Boolean))]
              .map((periodo) => `<option value="${periodo}" ${state.gradeFilters.turma === periodo ? "selected" : ""}>${periodo}</option>`)
              .join("")}
          </select>
        </div>

        <div id="grade-wrap-docente" style="display:${state.gradeFilters.view === "docente" ? "block" : "none"}">
          <label>Docente</label>
          <select id="grade-docente">
            <option value="">Todos</option>
            ${state.docentes.map((doc) => `
              <option value="${doc.id}" ${state.gradeFilters.docente === doc.id ? "selected" : ""}>
                ${doc.nome || "(sem nome)"}
              </option>
            `).join("")}
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <table class="grade-table">
        <thead>
          <tr>
            <th>Turno / Bloco</th>
            ${dias.map((dia) => `<th>${dia}</th>`).join("")}
          </tr>
        </thead>
        <tbody>
          ${Object.entries(blocosPorTurno).map(([turno, blocos]) =>
            blocos.map((bloco) => `
              <tr>
                <th>${turno} • ${bloco.numero}<br><span class="small">${bloco.faixa}</span></th>
                ${dias.map((dia) => {
                  const hits = filtered.filter((h) => {
                    if (h.dia !== dia || h.turno !== turno) return false;
                    const inicio = Number(h.blocoInicial);
                    const fim = inicio + Number(h.qtdBlocos) - 1;
                    return bloco.numero >= inicio && bloco.numero <= fim;
                  });

                  return `
                    <td class="grade-cell">
                      ${hits.map((h) => {
                        const oferta = state.oferta.find((o) => o.id === h.ofertaId);
                        const docentes = (oferta?.docentes || []).map(docenteNome).filter(Boolean).join(", ");
                        return `
                          <div class="slot-card">
                            <div class="slot-title">${oferta?.nome || ""}</div>
                            <div class="slot-sub">${oferta?.periodo || ""}</div>
                            <div class="slot-sub">${docentes}</div>
                          </div>
                        `;
                      }).join("")}
                    </td>
                  `;
                }).join("")}
              </tr>
            `).join("")
          ).join("")}
        </tbody>
      </table>
    </div>
  `;

  panel.querySelector("#grade-view").onchange = (e) => {
    state.gradeFilters.view = e.target.value;
    render();
  };
  panel.querySelector("#grade-turma").onchange = (e) => {
    state.gradeFilters.turma = e.target.value;
    render();
  };
  panel.querySelector("#grade-docente").onchange = (e) => {
    state.gradeFilters.docente = e.target.value;
    render();
  };
}
function render() {
  syncAtividades();
  renderTabs();
  showPanel(state.activeTab);

  renderDocentes();
  renderOferta();
  renderAtividades();
  renderResumo();
  renderHorarios();
  renderGrade();

  saveState();
}
document.getElementById("btnSeed").onclick = () => {
  seedData();
  render();
};
document.getElementById("btnExportJson").onclick = () => {
  downloadJson("dch_uern_dados.json", state);
};
document.getElementById("inputImport").onchange = (event) => {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const imported = JSON.parse(reader.result);
    Object.assign(state, imported);
    syncAtividades();
    render();
  };
  reader.readAsText(file);
};
document.getElementById("btnReset").onclick = () => {
  if (!confirm("Limpar tudo?")) return;
  localStorage.removeItem(STORAGE_KEY);
  seedData();
  render();
};

if (!loadState()) {
  seedData();
}
render();
</script>
</body>
</html>
