function uid(){ return Math.random().toString(36).slice(2,10); }
function roundInt(v){ return Math.round(Number(v||0)); }
function weeklyHours(total,weeks=15){ return Number(total||0)/Number(weeks||15); }
function blocksFromHours(total,weeks=15){ return roundInt(weeklyHours(total,weeks)); }
function isUCE(of){ return (of.codigo||"").startsWith("UCE") || (of.nome||"").toUpperCase().includes("UCE"); }
function isEspecialIndividual(of){ return of.tipo==="especial" && of.especial==="individual"; }

function fromCatalogo(comp){
  return { id:uid(), periodo:comp.periodo, codigo:comp.codigo, nome:comp.nome, teorica:comp.teorica, pratica:comp.pratica, orientacao:comp.orientacao, total:comp.total, tipo:comp.tipo||"obrigatoria", especial:comp.especial||"nao", docentes:[] };
}
function syncAtividades(){
  const ids=new Set(state.docentes.map(d=>d.id));
  Object.keys(state.atividades).forEach(id=>{ if(!ids.has(id)) delete state.atividades[id]; });
  state.docentes.forEach(docente=>{
    if(!state.atividades[docente.id]){
      state.atividades[docente.id]={ pesquisaInstitucionalizadaQtd:0, coordProjetoPibicQtd:0, monitoriaQtd:0, extensaoCoordenacaoQtd:0, extensaoMembroQtd:0, grupoPesquisaMembro:false, grupoPesquisaLider:false, nde:"none", fiel:false, fieb:false, comiteEtica:false, orientacoesTcc:0, orientacoesMestrado:0, outrasComissoes:[] };
    }
  });
}

function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function loadState(){ const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return false; Object.assign(state, JSON.parse(raw)); syncAtividades(); return true; }

function addOfertaFromCatalogo(codigo){
  const comp=state.catalogo.find(c=>c.codigo===codigo); if(!comp) return; state.oferta.push(fromCatalogo(comp));
}
function addPeriodoFromCatalogo(periodo){
  state.catalogo.filter(c=>c.periodo===periodo).forEach(comp=>state.oferta.push(fromCatalogo(comp)));
}
function calcBlocosNecessarios(of){
  if(isUCE(of)) return 1;
  return blocksFromHours(of.total || (Number(of.teorica||0)+Number(of.pratica||0)+Number(of.orientacao||0)), 15);
}
function calcDisciplinaParaDocente(of, docenteId){
  if(!(of.docentes||[]).includes(docenteId)) return {sala:0, regencia:0};
  if(isUCE(of)) return {sala:1, regencia:0};
  const n=(of.docentes||[]).length || 1;
  const multiplicador=isEspecialIndividual(of) ? 0.5 : 1;
  const teoricaSemanal=(weeklyHours(of.teorica,15)/n)*multiplicador;
  const praticaSemanal=weeklyHours(of.pratica,15)*multiplicador;
  return {
    sala: roundInt(teoricaSemanal + praticaSemanal),
    regencia: roundInt(teoricaSemanal + (praticaSemanal * 0.5)),
  };
}
function calcAtividadesDocente(docenteId){
  const a=state.atividades[docenteId]||{};
  const nde={none:0,membro:2,coordenacao:8}[a.nde||"none"]||0;
  const outras=(a.outrasComissoes||[]).reduce((acc,item)=>acc+Number(item.ch||0),0);
  return {
    pesquisaInstitucionalizada: Number(a.pesquisaInstitucionalizadaQtd||0)*4,
    coordProjetoPibic: Number(a.coordProjetoPibicQtd||0)*8,
    monitoria: Number(a.monitoriaQtd||0)*4,
    extensaoCoordQtd: Number(a.extensaoCoordenacaoQtd||0),
    extensaoMembroQtd: Number(a.extensaoMembroQtd||0),
    extensao: Number(a.extensaoCoordenacaoQtd||0)*8 + Number(a.extensaoMembroQtd||0)*4,
    grupoPesquisaMembro: a.grupoPesquisaMembro ? 1 : 0,
    grupoPesquisaLider: a.grupoPesquisaLider ? 2 : 0,
    grupoPesquisa: (a.grupoPesquisaMembro?1:0)+(a.grupoPesquisaLider?2:0),
    orientTccQtd: Number(a.orientacoesTcc||0),
    orientTcc: Number(a.orientacoesTcc||0)*2,
    orientMestradoQtd: Number(a.orientacoesMestrado||0),
    orientMestrado: Number(a.orientacoesMestrado||0)*3,
    nde,
    fiel: a.fiel?2:0,
    fieb: a.fieb?2:0,
    comiteEtica: a.comiteEtica?8:0,
    outrasComissoes: outras,
    comissoes: nde + (a.fiel?2:0) + (a.fieb?2:0) + (a.comiteEtica?8:0) + outras,
    flags: a,
  };
}
function calcResumoDocente(docente){
  let sala=0, regencia=0;
  state.oferta.forEach(of=>{ const c=calcDisciplinaParaDocente(of, docente.id); sala+=c.sala; regencia+=c.regencia; });
  const acts=calcAtividadesDocente(docente.id);
  return {
    sala:roundInt(sala), regencia:roundInt(regencia), monitoria:roundInt(acts.monitoria),
    pesquisaInstitucionalizada:roundInt(acts.pesquisaInstitucionalizada), grupoPesquisa:roundInt(acts.grupoPesquisa),
    coordProjetoPibic:roundInt(acts.coordProjetoPibic), extensao:roundInt(acts.extensao),
    orientTcc:roundInt(acts.orientTcc), orientMestrado:roundInt(acts.orientMestrado),
    comissoes:roundInt(acts.comissoes),
    total:roundInt(sala+regencia+acts.monitoria+acts.pesquisaInstitucionalizada+acts.grupoPesquisa+acts.coordProjetoPibic+acts.extensao+acts.orientTcc+acts.orientMestrado+acts.comissoes+Number(docente.chFuncao||0)),
    detalhado:acts
  };
}
function detalhamentoDisciplinas(docenteId){
  return state.oferta.filter(of=>(of.docentes||[]).includes(docenteId)).map(of=>{ const c=calcDisciplinaParaDocente(of, docenteId); return {periodo:of.periodo,codigo:of.codigo,disciplina:of.nome,sala:c.sala,regencia:c.regencia}; });
}
function buildResumoDetalhadoTexto(docenteId){
  const a=calcAtividadesDocente(docenteId), linhas=[];
  linhas.push(`Pesquisa institucionalizada: ${a.flags.pesquisaInstitucionalizadaQtd||0} item(ns) = ${a.pesquisaInstitucionalizada}h`);
  linhas.push(`Coordenação PIBIC: ${a.flags.coordProjetoPibicQtd||0} item(ns) = ${a.coordProjetoPibic}h`);
  linhas.push(`Monitoria: ${a.flags.monitoriaQtd||0} item(ns) = ${a.monitoria}h`);
  linhas.push(`Extensão coordenação: ${a.extensaoCoordQtd} ação(ões) = ${a.extensaoCoordQtd*8}h`);
  linhas.push(`Extensão membro: ${a.extensaoMembroQtd} ação(ões) = ${a.extensaoMembroQtd*4}h`);

  linhas.push(`Grupo de pesquisa líder: ${a.flags.grupoPesquisaLider ? "Sim (2h)" : "Não"}`);
  linhas.push(`NDE: ${a.flags.nde==="coordenacao" ? "Coordenação (8h)" : a.flags.nde==="membro" ? "Membro (2h)" : "Não"}`);
  linhas.push(`FIEL: ${a.flags.fiel ? "Sim (2h)" : "Não"}`);
  linhas.push(`FIEB: ${a.flags.fieb ? "Sim (2h)" : "Não"}`);
  linhas.push(`Comitê de Ética: ${a.flags.comiteEtica ? "Sim (8h)" : "Não"}`);
  linhas.push(`Orientações TCC: ${a.orientTccQtd} aluno(s) = ${a.orientTcc}h`);
  linhas.push(`Orientações Mestrado: ${a.orientMestradoQtd} orientando(s) = ${a.orientMestrado}h`);
  (a.flags.outrasComissoes||[]).forEach(item=>linhas.push(`Comissão: ${item.nome||"(sem nome)"} = ${item.ch||0}h`));
  return linhas;
}
function expandHorarioItem(item){
  const of=state.oferta.find(o=>o.id===item.ofertaId); if(!of) return [];
  const arr=[]; for(let i=0;i<Number(item.qtdBlocos||0);i++){ arr.push({horarioId:item.id,ofertaId:item.ofertaId,periodo:of.periodo,docentes:of.docentes||[],dia:item.dia,turno:item.turno,bloco:Number(item.blocoInicial||1)+i}); } return arr;
}
function detectConflicts(){
  const exp=state.horarios.flatMap(expandHorarioItem), res={};
  state.horarios.forEach(h=>res[h.id]={docente:false,periodo:false});
  for(let i=0;i<exp.length;i++)for(let j=i+1;j<exp.length;j++){
    const a=exp[i], b=exp[j];
    if(a.horarioId===b.horarioId) continue;
    if(a.dia!==b.dia || a.turno!==b.turno || a.bloco!==b.bloco) continue;
    if(a.periodo && b.periodo && a.periodo===b.periodo){ res[a.horarioId].periodo=true; res[b.horarioId].periodo=true; }
    if((a.docentes||[]).some(id=>(b.docentes||[]).includes(id))){ res[a.horarioId].docente=true; res[b.horarioId].docente=true; }
  }
  return res;
}

  panel.innerHTML=`<div class="bar"><h2>Relatórios</h2></div>

  ${resumoDocente?`<table><thead><tr><th>Docente</th><th>Sala</th><th>Regência</th><th>Monitoria</th><th>Pesquisa</th><th>Coord. PIBIC</th><th>Extensão</th><th>Orient. TCC</th><th>Orient. Mestrado</th><th>Comissões</th><th>Total</th></tr></thead><tbody><tr><td>${resumoDocente.nome}</td><td>${resumoDocente.sala}</td><td>${resumoDocente.regencia}</td><td>${resumoDocente.monitoria}</td><td>${resumoDocente.pesquisaInstitucionalizada+resumoDocente.grupoPesquisa}</td><td>${resumoDocente.coordProjetoPibic}</td><td>${resumoDocente.extensao}</td><td>${resumoDocente.orientTcc}</td><td>${resumoDocente.orientMestrado}</td><td>${resumoDocente.comissoes}</td><td>${resumoDocente.total}</td></tr></tbody></table>
  <div class="card" style="margin-top:.8rem"><div class="bar"><h4>Disciplinas do docente</h4></div><table><thead><tr><th>Período</th><th>Código</th><th>Disciplina</th><th>CH sala</th><th>CH regência</th></tr></thead><tbody>${detalhamentoDocente.map(item=>`<tr><td>${item.periodo}</td><td>${item.codigo}</td><td>${item.disciplina}</td><td>${item.sala}</td><td>${item.regencia}</td></tr>`).join("")}</tbody></table></div>
  <div class="card" style="margin-top:.8rem"><div class="bar"><h4>Detalhamento das atividades</h4></div><ul class="detail-list">${atividadesDetalhadas.map(l=>`<li>${l}</li>`).join("")}</ul></div>`:""}</div>
  <div class="card" style="margin-bottom:.8rem"><div class="bar"><h3>Quadro resumo de todos os docentes</h3><div class="inline-actions"><button id="csv-todos">CSV</button><button id="pdf-todos">PDF</button></div></div>
  <table><thead><tr><th>Docente</th><th>Sala</th><th>Regência</th><th>Monitoria</th><th>Pesquisa</th><th>Coord. PIBIC</th><th>Extensão</th><th>Orientações</th><th>Comissões</th><th>Total</th></tr></thead><tbody>${resumos.map(r=>`<tr><td>${r.nome}</td><td>${r.sala}</td><td>${r.regencia}</td><td>${r.monitoria}</td><td>${r.pesquisaInstitucionalizada+r.grupoPesquisa}</td><td>${r.coordProjetoPibic}</td><td>${r.extensao}</td><td>${r.orientTcc+r.orientMestrado}</td><td>${r.comissoes}</td><td>${r.total}</td></tr>`).join("")}</tbody></table></div>
  <div class="card"><div class="bar"><h3>Quadro de horários por período</h3><div class="inline-actions"><select id="rel-periodo">${periodos.map(p=>`<option value="${p}" ${p===state.relPeriodo?"selected":""}>${p}</option>`).join("")}</select><button id="csv-horarios">CSV</button><button id="pdf-horarios">PDF</button></div></div>
  <table><thead><tr><th>Disciplina</th><th>Dia</th><th>Turno</th><th>Bloco inicial</th><th>Qtd.</th><th>Docentes</th></tr></thead><tbody>${horariosPeriodo.map(h=>{ const of=state.oferta.find(o=>o.id===h.ofertaId); const docs=(of?.docentes||[]).map(docenteNome).filter(Boolean).join(", "); return `<tr><td>${of?.nome||""}</td><td>${h.dia}</td><td>${h.turno}</td><td>${h.blocoInicial}</td><td>${h.qtdBlocos}</td><td>${docs}</td></tr>`; }).join("")}</tbody></table></div>`;
  panel.querySelector("#rel-docente").onchange=e=>{ state.relDocenteId=e.target.value; render(); };
  panel.querySelector("#rel-periodo").onchange=e=>{ state.relPeriodo=e.target.value; render(); };
  panel.querySelector("#csv-docente").onclick=()=>{ if(!resumoDocente) return; downloadCsv("relatorio_docente.csv",[["Docente","Sala","Regência","Monitoria","Pesquisa","Coord. PIBIC","Extensão","Orient. TCC","Orient. Mestrado","Comissões","Total"],[resumoDocente.nome,resumoDocente.sala,resumoDocente.regencia,resumoDocente.monitoria,resumoDocente.pesquisaInstitucionalizada+resumoDocente.grupoPesquisa,resumoDocente.coordProjetoPibic,resumoDocente.extensao,resumoDocente.orientTcc,resumoDocente.orientMestrado,resumoDocente.comissoes,resumoDocente.total],[],["Período","Código","Disciplina","CH sala","CH regência"],...detalhamentoDocente.map(item=>[item.periodo,item.codigo,item.disciplina,item.sala,item.regencia]),[],["Detalhamento das atividades"],...atividadesDetalhadas.map(txt=>[txt])]); };
  panel.querySelector("#pdf-docente").onclick=()=>{ if(!resumoDocente) return; gerarPdfTabela("Quadro resumo por docente",[["Docente","Sala","Regência","Monitoria","Pesquisa","Coord. PIBIC","Extensão","Orient. TCC","Orient. Mestrado","Comissões","Total"]],[[resumoDocente.nome,resumoDocente.sala,resumoDocente.regencia,resumoDocente.monitoria,resumoDocente.pesquisaInstitucionalizada+resumoDocente.grupoPesquisa,resumoDocente.coordProjetoPibic,resumoDocente.extensao,resumoDocente.orientTcc,resumoDocente.orientMestrado,resumoDocente.comissoes,resumoDocente.total]],"relatorio_docente.pdf"); };
  panel.querySelector("#csv-todos").onclick=()=>{ downloadCsv("relatorio_todos_docentes.csv",[["Docente","Sala","Regência","Monitoria","Pesquisa","Coord. PIBIC","Extensão","Orientações","Comissões","Total"],...resumos.map(r=>[r.nome,r.sala,r.regencia,r.monitoria,r.pesquisaInstitucionalizada+r.grupoPesquisa,r.coordProjetoPibic,r.extensao,r.orientTcc+r.orientMestrado,r.comissoes,r.total])]); };
  panel.querySelector("#pdf-todos").onclick=()=>{ gerarPdfTabela("Quadro resumo de todos os docentes",[["Docente","Sala","Regência","Monitoria","Pesquisa","Coord. PIBIC","Extensão","Orientações","Comissões","Total"]],resumos.map(r=>[r.nome,r.sala,r.regencia,r.monitoria,r.pesquisaInstitucionalizada+r.grupoPesquisa,r.coordProjetoPibic,r.extensao,r.orientTcc+r.orientMestrado,r.comissoes,r.total]),"relatorio_todos_docentes.pdf"); };
  panel.querySelector("#csv-horarios").onclick=()=>{ downloadCsv(`relatorio_horarios_${state.relPeriodo}.csv`,[["Disciplina","Dia","Turno","Bloco inicial","Qtd.","Docentes"],...horariosPeriodo.map(h=>{ const of=state.oferta.find(o=>o.id===h.ofertaId); const docs=(of?.docentes||[]).map(docenteNome).filter(Boolean).join(", "); return [of?.nome||"",h.dia,h.turno,h.blocoInicial,h.qtdBlocos,docs]; })]); };
  panel.querySelector("#pdf-horarios").onclick=()=>{ gerarPdfTabela(`Quadro de horários - ${state.relPeriodo}`,[["Disciplina","Dia","Turno","Bloco inicial","Qtd.","Docentes"]],horariosPeriodo.map(h=>{ const of=state.oferta.find(o=>o.id===h.ofertaId); const docs=(of?.docentes||[]).map(docenteNome).filter(Boolean).join(", "); return [of?.nome||"",h.dia,h.turno,h.blocoInicial,h.qtdBlocos,docs]; }),`relatorio_horarios_${state.relPeriodo}.pdf`); };
}
function render(){
  syncAtividades(); renderTabs(); showPanel(state.activeTab);
  renderDocentes(); renderOferta(); renderAtividades(); renderResumo(); renderHorarios(); renderGrade(); renderRelatorios();
  saveState();
}
document.getElementById("btnSeed").onclick=()=>{ seedData(); render(); };
document.getElementById("btnExportJson").onclick=()=>downloadJson("dch_uern_dados.json", state);
document.getElementById("inputImport").onchange=(e)=>{ const file=e.target.files?.[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{ Object.assign(state, JSON.parse(reader.result)); syncAtividades(); render(); }; reader.readAsText(file); };
document.getElementById("btnReset").onclick=()=>{ if(!confirm("Limpar tudo?")) return; localStorage.removeItem(STORAGE_KEY); seedData(); render(); };
if(!loadState()) seedData();
render();
</script>
</body>
</html>
